name: Deploy Frontend → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @workspace/ikiss run build
        env:
          BASE_PATH: /
          PORT: 5173
          VITE_API_URL: https://api.ikiss.me
          VITE_TURNSTILE_SITE_KEY: 0x4AAAAAADCou66RkKmd1DwX
          NODE_ENV: production

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: artifacts/ikiss/dist/public
          cname: ikiss.me
          force_orphan: true

      - name: Purge Cloudflare cache
        id: cf_purge
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_PURGE_TOKEN }}
          CF_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ZONE" ]; then
            echo "Cloudflare purge skipped: CLOUDFLARE_PURGE_TOKEN or CLOUDFLARE_ZONE_ID is not set."
            {
              echo "http_status=skipped"
              echo "body<<CF_BODY_EOF"
              echo "Cloudflare purge skipped due to missing secrets."
              echo "CF_BODY_EOF"
              echo "failure_reason<<CF_REASON_EOF"
              echo ""
              echo "CF_REASON_EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Purging Cloudflare cache for zone $CF_ZONE..."
          response=$(curl -sS -o /tmp/cf.json -w "%{http_code}" \
            -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/purge_cache" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}') || response="000"
          echo "HTTP $response"
          cat /tmp/cf.json || true
          echo
          body=$(cat /tmp/cf.json 2>/dev/null || echo "(no response body)")
          reason=""
          if [ "$response" != "200" ]; then
            reason="Cloudflare purge failed (HTTP $response). Verify the token has the 'Zone.Cache Purge' permission on the ikiss.me zone."
          elif ! grep -q '"success":true' /tmp/cf.json; then
            reason="Cloudflare purge returned success=false. See response body."
          fi
          {
            echo "http_status=$response"
            echo "body<<CF_BODY_EOF"
            echo "$body"
            echo "CF_BODY_EOF"
            echo "failure_reason<<CF_REASON_EOF"
            echo "$reason"
            echo "CF_REASON_EOF"
          } >> "$GITHUB_OUTPUT"
          if [ -n "$reason" ]; then
            echo "::warning::$reason"
            exit 0
          fi
          echo "Cloudflare cache purged successfully."

      - name: Notify on Cloudflare purge failure
        if: ${{ steps.cf_purge.outcome == 'success' && steps.cf_purge.outputs.failure_reason != '' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          CF_HTTP_STATUS: ${{ steps.cf_purge.outputs.http_status }}
          CF_REASON: ${{ steps.cf_purge.outputs.failure_reason }}
          CF_BODY: ${{ steps.cf_purge.outputs.body }}
        run: |
          set -e
          title="Cloudflare cache purge failed on deploy"
          label="cloudflare-purge-failure"

          # Make sure the label exists (ignore error if it already does).
          gh label create "$label" \
            --color "B60205" \
            --description "Auto-aberto quando o passo Purge Cloudflare cache do deploy falha" \
            --repo "$GH_REPO" >/dev/null 2>&1 || true

          body_file="$(mktemp)"
          {
            printf '%s\n\n' "O passo **Purge Cloudflare cache** do workflow \`deploy-frontend.yml\` falhou. O deploy em si foi publicado normalmente, mas o cache da Cloudflare pode estar servindo a versão antiga do site até ser purgado manualmente."
            printf '- **Motivo**: %s\n' "$CF_REASON"
            printf '- **HTTP status**: `%s`\n' "$CF_HTTP_STATUS"
            printf '- **Commit**: `%s`\n' "$COMMIT_SHA"
            printf '- **Run**: %s\n\n' "$RUN_URL"
            printf '**Resposta da Cloudflare:**\n'
            printf '```\n%s\n```\n\n' "$CF_BODY"
            printf '### Como resolver\n'
            printf '1. Confirme que o secret `CLOUDFLARE_PURGE_TOKEN` ainda é válido e tem a permissão **Zone.Cache Purge** na zona `ikiss.me`.\n'
            printf '2. Rode o purge manualmente (ver `replit-leia-aqui.md` → "Purge automático no GitHub Actions").\n'
            printf '3. Feche essa issue depois que o próximo deploy passar com sucesso.\n'
          } > "$body_file"

          existing=$(gh issue list \
            --repo "$GH_REPO" \
            --state open \
            --label "$label" \
            --search "in:title \"$title\"" \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null || true)

          if [ -n "$existing" ]; then
            echo "Updating existing issue #$existing"
            if ! gh issue comment "$existing" --repo "$GH_REPO" --body-file "$body_file"; then
              echo "::warning::Failed to comment on issue #$existing about the Cloudflare purge failure. Check the gh CLI output above. The deploy is still considered successful."
            fi
          else
            echo "Opening new issue"
            if ! gh issue create \
                --repo "$GH_REPO" \
                --title "$title" \
                --label "$label" \
                --body-file "$body_file"; then
              echo "::warning::Failed to open a new issue about the Cloudflare purge failure. Check the gh CLI output above. The deploy is still considered successful."
            fi
          fi
