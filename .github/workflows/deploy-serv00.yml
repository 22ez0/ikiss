name: Deploy API → Serv00

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/api-server/**'
      - 'lib/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.SERV00_HOST != '' && secrets.SERV00_HOST != '0' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERV00_HOST }}
          username: ${{ secrets.SERV00_USER }}
          key: ${{ secrets.SERV00_SSH_KEY }}
          port: 22
          script: bash ~/ikiss/scripts/deploy-serv00.sh
