name: Backup production database

on:
  schedule:
    # Every day at 03:00 UTC (00:00 BRT)
    - cron: '0 3 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL 18 client
        run: |
          set -euo pipefail
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18
          # Ubuntu noble already ships pg16 in $PATH; prepend pg18 bin dir so pg_dump matches the Neon server (pg18)
          echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/18/bin/pg_dump --version

      - name: Run backup
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          if [ -z "${NEON_DATABASE_URL:-}" ]; then
            echo "ERROR: NEON_DATABASE_URL repo secret is not set"
            exit 1
          fi
          chmod +x scripts/db-backup.sh
          ./scripts/db-backup.sh backups

      - name: Upload backup as artifact (retention 30 days)
        uses: actions/upload-artifact@v4
        with:
          name: ikiss-db-backup-${{ github.run_id }}
          path: backups/*.sql.gz
          retention-days: 30
          if-no-files-found: error
