name: Sync Secrets → Replit

# Sincroniza todos os secrets do repositório GitHub de volta para o Replit.
# Útil quando um novo dev abre o projeto no Replit e precisa de todos os secrets.
#
# Como usar:
#   GitHub → Actions → "Sync Secrets → Replit" → Run workflow
#   Preencha o REPLIT_TOKEN (gere em: https://replit.com/account#api-keys)
#   O REPL_ID do projeto: 61665209-ikissme9 (ver replit.md)

on:
  workflow_dispatch:
    inputs:
      replit_token:
        description: "Token de API do Replit (https://replit.com/account#api-keys)"
        required: true
        type: string
      repl_id:
        description: "REPL_ID do projeto Replit (padrão: ikiss.me)"
        required: false
        default: "61665209-ikissme9"
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync secrets to Replit via API
        env:
          REPLIT_TOKEN: ${{ inputs.replit_token }}
          REPL_ID: ${{ inputs.repl_id }}
          # Secrets que serão sincronizados para o Replit
          S_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          S_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          S_NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          S_TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          S_EMAIL_WEBHOOK_SECRET: ${{ secrets.EMAIL_WEBHOOK_SECRET }}
          S_DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          S_SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          S_CLOUDFLARE_PURGE_TOKEN: ${{ secrets.CLOUDFLARE_PURGE_TOKEN }}
          S_RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          S_RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          set -euo pipefail

          BASE="https://replit.com/graphql"
          AUTH="Authorization: Bearer $REPLIT_TOKEN"

          push_secret() {
            local key="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "⚠️  $key está vazio — pulando"
              return 0
            fi
            local payload
            payload=$(jq -n --arg replId "$REPL_ID" --arg key "$key" --arg value "$value" \
              '{"query":"mutation CreateOrUpdateSecret($input: CreateOrUpdateSecretInput!) { createOrUpdateSecret(input: $input) { secret { key } } }","variables":{"input":{"replId":$replId,"key":$key,"value":$value}}}')
            local http_code
            http_code=$(curl -sS -o /tmp/gql_out.json -w "%{http_code}" \
              -X POST "$BASE" \
              -H "$AUTH" \
              -H "Content-Type: application/json" \
              -d "$payload")
            if [ "$http_code" != "200" ]; then
              echo "❌ $key falhou (HTTP $http_code)"
              cat /tmp/gql_out.json || true
            elif grep -q '"errors"' /tmp/gql_out.json; then
              echo "❌ $key erro GraphQL:"
              cat /tmp/gql_out.json || true
            else
              echo "✅ $key sincronizado"
            fi
          }

          echo "🔄 Sincronizando secrets para Replit (REPL_ID: $REPL_ID)..."

          push_secret "R2_ACCESS_KEY_ID"       "$S_R2_ACCESS_KEY_ID"
          push_secret "R2_SECRET_ACCESS_KEY"   "$S_R2_SECRET_ACCESS_KEY"
          push_secret "NEON_DATABASE_URL"       "$S_NEON_DATABASE_URL"
          push_secret "TURNSTILE_SECRET_KEY"    "$S_TURNSTILE_SECRET_KEY"
          push_secret "EMAIL_WEBHOOK_SECRET"    "$S_EMAIL_WEBHOOK_SECRET"
          push_secret "DISCORD_BOT_TOKEN"       "$S_DISCORD_BOT_TOKEN"
          push_secret "SESSION_SECRET"          "$S_SESSION_SECRET"
          push_secret "CLOUDFLARE_PURGE_TOKEN"  "$S_CLOUDFLARE_PURGE_TOKEN"
          push_secret "RENDER_API_KEY"          "$S_RENDER_API_KEY"
          push_secret "RESEND_API_KEY"          "$S_RESEND_API_KEY"

          echo ""
          echo "✅ Sincronização concluída."
          echo "   Reinicie os workflows no Replit para aplicar."
