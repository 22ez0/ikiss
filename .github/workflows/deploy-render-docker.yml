name: Deploy Backend → Render (Docker)

# Dispara após o build-docker.yml terminar com sucesso
on:
  workflow_run:
    workflows: ["Build & Push Docker Image → ghcr.io"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      service_id:
        description: "Render Service ID (ex: srv-xxxx)"
        required: false
        default: ""

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ inputs.service_id || vars.RENDER_SERVICE_ID || '' }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "::warning::RENDER_API_KEY não configurado — deploy ignorado."
            exit 0
          fi

          if [ -z "$SERVICE_ID" ]; then
            # Tentar descobrir o service ID pelo nome faren-api
            SERVICE_ID=$(curl -s "https://api.render.com/v1/services?name=faren-api&limit=5" \
              -H "Authorization: Bearer $RENDER_API_KEY" | \
              node -e "const c=[];process.stdin.on('data',d=>c.push(d));process.stdin.on('end',()=>{
                const d=JSON.parse(Buffer.concat(c));
                const svc=d.find?.(s=>s?.service?.name==='faren-api');
                console.log(svc?.service?.id||'');
              })" 2>/dev/null || echo "")
          fi

          if [ -z "$SERVICE_ID" ]; then
            echo "::warning::Nenhum serviço faren-api encontrado no Render. Crie o serviço primeiro."
            echo "Veja SETUP.md → 'Como reativar o Render'."
            exit 0
          fi

          echo "Triggering deploy of service $SERVICE_ID..."
          RESULT=$(curl -s -X POST \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          
          echo "Render response: $RESULT"
          DEPLOY_ID=$(echo "$RESULT" | node -e "
            const c=[];process.stdin.on('data',d=>c.push(d));process.stdin.on('end',()=>{
              try{const d=JSON.parse(Buffer.concat(c));console.log(d.id||d.deploy?.id||'');}catch{console.log('');}
            })")
          
          if [ -n "$DEPLOY_ID" ]; then
            echo "Deploy iniciado: $DEPLOY_ID"
            echo "Dashboard: https://dashboard.render.com/web/$SERVICE_ID/deploys"
          else
            echo "::error::Falha ao iniciar deploy. Resposta: $RESULT"
            exit 1
          fi
