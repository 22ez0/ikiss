name: Deploy Backend → Render (Docker)

# Dispara após o build-docker.yml terminar com sucesso
on:
  workflow_run:
    workflows: ["Build & Push Docker Image → ghcr.io"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      service_id:
        description: "Render Service ID (ex: srv-xxxx). Se vazio, tenta descobrir pelo nome faren-api."
        required: false
        default: ""

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          # RENDER_SERVICE_ID deve ser configurado como secret (Settings → Secrets → Actions)
          SERVICE_ID: ${{ inputs.service_id || secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "::warning::RENDER_API_KEY não configurado — deploy ignorado."
            exit 0
          fi

          if [ -z "$SERVICE_ID" ]; then
            echo "Buscando service 'faren-api' pelo nome..."
            SERVICE_ID=$(curl -sf "https://api.render.com/v1/services?name=faren-api&limit=5" \
              -H "Authorization: Bearer $RENDER_API_KEY" | \
              python3 -c "
import sys, json
data = json.load(sys.stdin)
svc = next((s for s in data if s.get('service',{}).get('name') == 'faren-api'), None)
print(svc['service']['id'] if svc else '')
" 2>/dev/null || echo "")
          fi

          if [ -z "$SERVICE_ID" ]; then
            echo "::error::Nenhum serviço faren-api encontrado no Render."
            echo "Configure o secret RENDER_SERVICE_ID em Settings → Secrets → Actions."
            echo "Veja SETUP.md → 'Após reativar: recriar o serviço no Render'."
            exit 1
          fi

          echo "Disparando deploy do serviço $SERVICE_ID..."
          HTTP_STATUS=$(curl -s -o /tmp/render_deploy_response.json -w "%{http_code}" \
            -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')

          RESPONSE=$(cat /tmp/render_deploy_response.json)
          echo "HTTP status: $HTTP_STATUS"
          echo "Render response: $RESPONSE"

          if [ "$HTTP_STATUS" != "201" ] && [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Falha ao disparar deploy (HTTP $HTTP_STATUS). Resposta: $RESPONSE"
            exit 1
          fi

          DEPLOY_ID=$(echo "$RESPONSE" | python3 -c "
import sys, json
data = json.load(sys.stdin)
print(data.get('id') or data.get('deploy', {}).get('id', ''))
" 2>/dev/null || echo "")

          if [ -n "$DEPLOY_ID" ]; then
            echo "Deploy iniciado com sucesso: $DEPLOY_ID"
            echo "Dashboard: https://dashboard.render.com/web/$SERVICE_ID/deploys"
          else
            echo "::warning::Deploy pode ter sido iniciado mas o ID não foi extraído. Verifique o dashboard."
          fi
