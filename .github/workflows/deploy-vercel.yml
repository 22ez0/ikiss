name: Deploy API → Vercel

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/api-server/**'
      - 'lib/**'
      - 'vercel.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

# Requisitos (GitHub Secrets):
#   VERCEL_TOKEN        — Personal Access Token da Vercel (Account Settings → Tokens, escopo Full Account)
#   VERCEL_PROJECT_ID   — ID do projeto Vercel (projeto → Settings → General → Project ID)
#   NEON_DATABASE_URL, SESSION_SECRET, RESEND_API_KEY,
#   R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, TURNSTILE_SECRET_KEY

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Get Vercel Org ID
        id: vercel_org
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Tenta buscar team (org) primeiro; se não tiver, usa conta pessoal
          ORG_ID=$(curl -sf "https://api.vercel.com/v2/teams" \
            -H "Authorization: Bearer $VERCEL_TOKEN" | \
            node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);process.stdout.write(j.teams?.[0]?.id||'')}catch(e){process.stdout.write('')}})" || true)

          if [ -z "$ORG_ID" ]; then
            ORG_ID=$(curl -sf "https://api.vercel.com/v2/user" \
              -H "Authorization: Bearer $VERCEL_TOKEN" | \
              node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);process.stdout.write(j.user?.id||'')}catch(e){process.stdout.write('')}})")
          fi

          if [ -z "$ORG_ID" ]; then
            echo "::error::Não foi possível obter o Org ID da Vercel. Verifique o VERCEL_TOKEN."
            exit 1
          fi

          echo "org_id=$ORG_ID" >> $GITHUB_OUTPUT
          echo "✓ Vercel Org ID: $ORG_ID"

      - name: Configure env vars on Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          SECRET_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          SECRET_SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          SECRET_RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SECRET_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          SECRET_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          SECRET_TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
        run: |
          get_env_id() {
            local KEY="$1"
            curl -sf "https://api.vercel.com/v9/projects/$PROJECT_ID/env" \
              -H "Authorization: Bearer $VERCEL_TOKEN" | \
              node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const e=JSON.parse(d).envs||[];const f=e.find(x=>x.key==='$KEY');process.stdout.write(f?f.id:'')}catch(e){process.stdout.write('')}})"
          }

          upsert_env() {
            local KEY="$1" SHELL_VAR="$2" TYPE="${3:-encrypted}"
            local VALUE="${!SHELL_VAR}"
            local PAYLOAD EXISTING_ID HTTP

            PAYLOAD=$(KEY="$KEY" TYPE="$TYPE" VAL="$VALUE" node -e "process.stdout.write(JSON.stringify({key:process.env.KEY,value:process.env.VAL,type:process.env.TYPE,target:['production','preview']}))")
            EXISTING_ID=$(get_env_id "$KEY")

            if [ -n "$EXISTING_ID" ]; then
              HTTP=$(curl -sf -o /dev/null -w "%{http_code}" -X PATCH \
                "https://api.vercel.com/v9/projects/$PROJECT_ID/env/$EXISTING_ID" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json" --data-raw "$PAYLOAD")
            else
              HTTP=$(curl -sf -o /dev/null -w "%{http_code}" -X POST \
                "https://api.vercel.com/v9/projects/$PROJECT_ID/env" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json" --data-raw "$PAYLOAD")
            fi

            case "$HTTP" in
              2*) echo "✓ $KEY (HTTP $HTTP)" ;;
              *) echo "::error::Falha ao configurar $KEY (HTTP $HTTP)"; exit 1 ;;
            esac
          }

          upsert_env "DATABASE_URL"         "SECRET_DATABASE_URL"
          upsert_env "SESSION_SECRET"       "SECRET_SESSION_SECRET"
          upsert_env "RESEND_API_KEY"       "SECRET_RESEND_API_KEY"
          upsert_env "R2_ACCESS_KEY_ID"     "SECRET_R2_ACCESS_KEY_ID"
          upsert_env "R2_SECRET_ACCESS_KEY" "SECRET_R2_SECRET_ACCESS_KEY"
          upsert_env "TURNSTILE_SECRET_KEY" "SECRET_TURNSTILE_SECRET_KEY"

          export PLAIN_NODE_ENV="production"
          export PLAIN_R2_ACCOUNT_ID="5a9a17dc69ada45f32c4aa36d4e8fdd9"
          export PLAIN_R2_BUCKET="faren-media"
          export PLAIN_R2_PUBLIC_URL="https://pub-49759bd8e09c4e0b89e475d23d273d2f.r2.dev"
          export PLAIN_APP_URL="https://ikiss.me"
          export PLAIN_CORS_ORIGINS="https://ikiss.me,https://www.ikiss.me"
          export PLAIN_EMAIL_FROM="Ikiss <no-reply@ikiss.me>"
          export PLAIN_RATE_LIMIT_MAX="300"
          export PLAIN_BOT_BLOCKING="true"

          upsert_env "NODE_ENV"              "PLAIN_NODE_ENV"       "plain"
          upsert_env "R2_ACCOUNT_ID"         "PLAIN_R2_ACCOUNT_ID"  "plain"
          upsert_env "R2_BUCKET"             "PLAIN_R2_BUCKET"      "plain"
          upsert_env "R2_PUBLIC_URL"         "PLAIN_R2_PUBLIC_URL"  "plain"
          upsert_env "APP_URL"               "PLAIN_APP_URL"        "plain"
          upsert_env "CORS_ALLOWED_ORIGINS"  "PLAIN_CORS_ORIGINS"   "plain"
          upsert_env "EMAIL_FROM"            "PLAIN_EMAIL_FROM"     "plain"
          upsert_env "RATE_LIMIT_MAX"        "PLAIN_RATE_LIMIT_MAX" "plain"
          upsert_env "ENABLE_BOT_BLOCKING"   "PLAIN_BOT_BLOCKING"   "plain"

          echo "✅ Todas as variáveis configuradas no Vercel"

      - name: Pull Vercel project settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ steps.vercel_org.outputs.org_id }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build for Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ steps.vercel_org.outputs.org_id }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy to Vercel (production)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ steps.vercel_org.outputs.org_id }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Deploy concluído: $DEPLOY_URL"

      - name: Summary
        run: |
          echo "## ✅ Deploy Vercel → API" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
