name: Deploy API → Vercel

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/api-server/**'
      - 'lib/**'
      - 'vercel.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

# Requisitos (GitHub Secrets):
#   VERCEL_TOKEN       — Personal Access Token da Vercel (Settings → Tokens)
#   VERCEL_PROJECT_ID  — ID do projeto Vercel (crie em vercel.com, depois pegue em Settings)
#   NEON_DATABASE_URL  — String de conexão PostgreSQL Neon
#   SESSION_SECRET, RESEND_API_KEY, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, TURNSTILE_SECRET_KEY

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.VERCEL_TOKEN }}" ]       && MISSING="$MISSING VERCEL_TOKEN"
          [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]  && MISSING="$MISSING VERCEL_PROJECT_ID"
          [ -z "${{ secrets.NEON_DATABASE_URL }}" ]  && MISSING="$MISSING NEON_DATABASE_URL"
          if [ -n "$MISSING" ]; then
            echo "::error::Secrets faltando:$MISSING"
            echo ""
            echo "Para configurar:"
            echo "1. Acesse vercel.com → seu projeto → Settings → General → Project ID"
            echo "2. Adicione VERCEL_PROJECT_ID em GitHub → Settings → Secrets → Actions"
            echo "3. Para VERCEL_TOKEN: vercel.com → Account Settings → Tokens → Create"
            exit 1
          fi
          echo "✓ Todos os secrets configurados"

  deploy:
    needs: check-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build API
        run: pnpm --filter @workspace/api-server run build

      - name: Configure Vercel environment variables (via REST API)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          upsert_env() {
            local KEY="$1"
            local VALUE="$2"
            local TYPE="${3:-encrypted}"

            # Buscar ID existente
            EXISTING_ID=$(curl -sf "https://api.vercel.com/v9/projects/$PROJECT_ID/env" \
              -H "Authorization: Bearer $VERCEL_TOKEN" 2>/dev/null | \
              node -e "
                process.stdin.on('data',d=>{
                  try{
                    const envs=JSON.parse(d).envs||[];
                    const e=envs.find(x=>x.key==='$KEY');
                    process.stdout.write(e?e.id:'');
                  }catch(e){process.stdout.write('')}
                })" || echo "")

            # Montar payload com valor via variável de ambiente (evita injeção de shell)
            PAYLOAD=$(node -e "
              process.stdout.write(JSON.stringify({
                key: '$KEY',
                value: process.env.ENV_VALUE,
                type: '$TYPE',
                target: ['production','preview']
              }))" ENV_VALUE="$VALUE")

            if [ -n "$EXISTING_ID" ] && [ "$EXISTING_ID" != "null" ]; then
              HTTP=$(curl -sf -o /dev/null -w "%{http_code}" -X PATCH \
                "https://api.vercel.com/v9/projects/$PROJECT_ID/env/$EXISTING_ID" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json" \
                --data-raw "$PAYLOAD" 2>/dev/null || echo "000")
              echo "✓ $KEY atualizado (HTTP $HTTP)"
            else
              HTTP=$(curl -sf -o /dev/null -w "%{http_code}" -X POST \
                "https://api.vercel.com/v9/projects/$PROJECT_ID/env" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json" \
                --data-raw "$PAYLOAD" 2>/dev/null || echo "000")
              echo "✓ $KEY criado (HTTP $HTTP)"
            fi
          }

          # Secrets (encrypted)
          upsert_env "DATABASE_URL"         "${{ secrets.NEON_DATABASE_URL }}"
          upsert_env "SESSION_SECRET"       "${{ secrets.SESSION_SECRET }}"
          upsert_env "RESEND_API_KEY"       "${{ secrets.RESEND_API_KEY }}"
          upsert_env "R2_ACCESS_KEY_ID"     "${{ secrets.R2_ACCESS_KEY_ID }}"
          upsert_env "R2_SECRET_ACCESS_KEY" "${{ secrets.R2_SECRET_ACCESS_KEY }}"
          upsert_env "TURNSTILE_SECRET_KEY" "${{ secrets.TURNSTILE_SECRET_KEY }}"

          # Configurações não-secretas (plain)
          upsert_env "NODE_ENV"              "production"                                           "plain"
          upsert_env "R2_ACCOUNT_ID"        "5a9a17dc69ada45f32c4aa36d4e8fdd9"                     "plain"
          upsert_env "R2_BUCKET"            "faren-media"                                           "plain"
          upsert_env "R2_PUBLIC_URL"        "https://pub-49759bd8e09c4e0b89e475d23d273d2f.r2.dev"  "plain"
          upsert_env "APP_URL"              "https://ikiss.me"                                      "plain"
          upsert_env "CORS_ALLOWED_ORIGINS" "https://ikiss.me,https://www.ikiss.me"                "plain"
          upsert_env "EMAIL_FROM"           "Ikiss <no-reply@ikiss.me>"                            "plain"
          upsert_env "RATE_LIMIT_MAX"       "300"                                                   "plain"
          upsert_env "ENABLE_BOT_BLOCKING"  "true"                                                  "plain"

          echo "✅ Todas as variáveis de ambiente configuradas no Vercel"

      - name: Trigger Vercel deployment (via REST API)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          SHA="${{ github.sha }}"
          REPO_ID="1212812914"

          PAYLOAD=$(node -e "
            process.stdout.write(JSON.stringify({
              name: 'ikiss-api',
              project: process.env.PROJECT_ID,
              target: 'production',
              gitSource: {
                type: 'github',
                repoId: '$REPO_ID',
                ref: 'main',
                sha: '$SHA'
              }
            }))" PROJECT_ID="$PROJECT_ID")

          RESPONSE=$(curl -sf -X POST "https://api.vercel.com/v13/deployments?forceNew=1" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            --data-raw "$PAYLOAD" 2>/dev/null || echo '{}')

          DEPLOY_URL=$(echo "$RESPONSE" | node -e "
            process.stdin.on('data',d=>{
              try{const r=JSON.parse(d);process.stdout.write(r.url?'https://'+r.url:'')}
              catch(e){process.stdout.write('')}
            })")

          DEPLOY_ID=$(echo "$RESPONSE" | node -e "
            process.stdin.on('data',d=>{
              try{const r=JSON.parse(d);process.stdout.write(r.id||'')}
              catch(e){process.stdout.write('')}
            })")

          if [ -z "$DEPLOY_URL" ]; then
            echo "::warning::Deploy pode ter falhado. Resposta:"
            echo "$RESPONSE" | node -e "process.stdin.on('data',d=>{try{const r=JSON.parse(d);console.log('error:',r.error?.message||r.error?.code||'unknown')}catch(e){console.log('parse error')}})"
          fi

          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "Deployment triggered: $DEPLOY_URL (id: $DEPLOY_ID)"

      - name: Summary
        run: |
          echo "## Deploy Vercel → API" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.deploy.outputs.url }}" ]; then
            echo "✅ Deployment triggered: ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Deployment pode ter falhado. Verifique o dashboard Vercel." >> $GITHUB_STEP_SUMMARY
          fi
