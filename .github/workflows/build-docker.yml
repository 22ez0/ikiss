name: Build & Push Docker Image → ghcr.io

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/api-server/**'
      - 'lib/**'
      - 'Dockerfile'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/22ez0/ikiss-api
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set package visibility to public
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PATCH \
            "https://api.github.com/user/packages/container/ikiss-api" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d '{"visibility":"public"}')
          echo "HTTP status: $RESPONSE"
          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "204" ]; then
            echo "::warning::Não foi possível tornar o package público (HTTP $RESPONSE). Verifique manualmente em github.com/22ez0 → Packages → ikiss-api → Package settings."
          else
            echo "Package ghcr.io/22ez0/ikiss-api marcado como público com sucesso."
          fi
