# Faren — Render Blueprint (API + Discord Bot)
#
# Este blueprint cria DOIS serviços:
#   1. faren-api        — API REST (Express 5 + Neon Postgres)
#   2. faren-discord-bot — Bot do Discord (tsx, sem build step)
#
# A API é implantada em MÚLTIPLAS contas Render (rotação de failover).
# Todos os accounts usam o MESMO Neon Postgres compartilhado.
# O Cloudflare Worker rotaciona entre as URLs (failover em 5xx).
#
# IMPORTANTE: ao aplicar este blueprint em uma conta nova, defina manualmente
# no painel Render (Service → Environment) as variáveis marcadas sync: false.
#
# Para a API (faren-api):
#   DATABASE_URL          → Neon pooled connection string (igual em todos os accounts)
#   SESSION_SECRET        → 44 bytes (igual em todos os accounts)
#   ADMIN_SECRET          → 44 bytes (igual em todos os accounts)
#   ADMIN_PASSWORD        → bcrypt da senha admin
#   RESEND_API_KEY        → Resend.com API key
#   TURNSTILE_SECRET_KEY  → Cloudflare Turnstile secret
#   R2_ACCESS_KEY_ID      → Cloudflare R2 access key
#   R2_SECRET_ACCESS_KEY  → Cloudflare R2 secret
#   EMAIL_WEBHOOK_SECRET  → segredo compartilhado com o Cloudflare Worker
#
# Para o bot (faren-discord-bot):
#   DISCORD_BOT_TOKEN     → token do bot (Discord Developer Portal)
#   DATABASE_URL          → mesma Neon connection string da API
#   EMAIL_WEBHOOK_SECRET  → mesmo segredo da API
#
# Use scripts/render-fanout.mjs para aplicar em massa nas 10 contas.

services:
  - type: web
    name: faren-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@10 && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Database — Neon Postgres (shared across all Render accounts)
      - key: DATABASE_URL
        sync: false
      # Session & admin (must be SAME across all accounts for token compatibility)
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: ADMIN_LOGIN
        value: keefaren
      - key: ADMIN_PASSWORD
        sync: false
      # CORS
      - key: CORS_ALLOWED_ORIGINS
        value: https://ikiss.me,https://www.ikiss.me
      # Rate limiting
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "300"
      - key: ENABLE_BOT_BLOCKING
        value: "true"
      # Email (Resend)
      - key: EMAIL_FROM
        value: Ikiss <no-reply@ikiss.me>
      - key: RESEND_API_KEY
        sync: false
      # Cloudflare Turnstile
      - key: TURNSTILE_SECRET_KEY
        sync: false
      # Cloudflare R2 (shared bucket — same for all accounts)
      - key: R2_ACCOUNT_ID
        value: 5a9a17dc69ada45f32c4aa36d4e8fdd9
      - key: R2_BUCKET
        value: faren-media
      - key: R2_PUBLIC_URL
        value: https://pub-49759bd8e09c4e0b89e475d23d273d2f.r2.dev
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      # Email inbound webhook (Cloudflare Worker → API)
      - key: EMAIL_WEBHOOK_SECRET
        sync: false

  - type: web
    name: faren-discord-bot
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@10 && pnpm install
    startCommand: pnpm --filter @workspace/discord-bot run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Bot token — obter em discord.com/developers/applications
      - key: DISCORD_BOT_TOKEN
        sync: false
      # Mesma Neon connection string da API
      - key: DATABASE_URL
        sync: false
      # URL da API (ajustar se usar outro account Render)
      - key: API_BASE_URL
        value: https://faren-api-wn1z.onrender.com
      # Segredo compartilhado com Cloudflare Worker e API
      - key: EMAIL_WEBHOOK_SECRET
        sync: false
